<!DOCTYPE html>
<html>
<head>
  <title>WRAP CORNER</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #8e2de2, #ff3f6c, #ff905a);
    }

    .container {
      display: flex;
      width: 900px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .left {
      width: 35%;
      background: linear-gradient(180deg, #8e2de2, #ff3f6c);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 25px;
    }

    .logo {
      width: 150px;
      margin-bottom: 20px;
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .right {
      width: 65%;
      padding: 25px;
    }

    .right h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #8e2de2;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
    }

    textarea {
      resize: none;
      height: 60px;
    }

    input:focus, textarea:focus {
      border-color: #ff3f6c;
      box-shadow: 0 0 6px rgba(255,63,108,0.4);
    }

    input.error, textarea.error {
      border: 2px solid red;
      background: #ffe6e6;
    }

    .error-text {
      color: red;
      font-size: 12px;
      text-align: left;
      margin-bottom: 5px;
    }

    button {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .save {
      background: linear-gradient(45deg, #ff3f6c, #ff905a);
      color: white;
    }

    .export {
      background: linear-gradient(45deg, #8e2de2, #4facfe);
      color: white;
    }

    .label {
      background: #111;
      color: white;
    }

    #msg {
      text-align: center;
      margin-top: 10px;
      color: red;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img src="logo.png" class="logo">
    <h1>WRAP CORNER</h1>
    <p>Gifts • love • Customized</p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2>Create Order</h2>

    <input id="orderId" placeholder="Order ID">
    <div id="orderIdError" class="error-text"></div>

    <input id="name" placeholder="Customer Name">
    <div id="nameError" class="error-text"></div>

    <textarea id="address" placeholder="Delivery Address"></textarea>
    <div id="addressError" class="error-text"></div>

    <input id="phone" placeholder="Phone Number">
    <div id="phoneError" class="error-text"></div>

    <input id="amount" placeholder="Amount ₹">
    <div id="amountError" class="error-text"></div>

    <input id="payment" placeholder="Payment (COD/Prepaid)">
    <div id="paymentError" class="error-text"></div>

    <!-- PINCODE -->
    <input id="pincode" placeholder="Pincode">
    <div id="pincodeError" class="error-text"></div>

    <button class="save" onclick="saveOrder()">💖 Save Order</button>
    <button class="export" onclick="exportAll()">📊 Export Excel</button>
    <button class="label" onclick="goToLabel()">📦 Generate Label</button>

    <p id="msg"></p>
  </div>

</div>

<script>

function validateForm() {
  let valid = true;

  let orderId = document.getElementById("orderId");
  let name = document.getElementById("name");
  let address = document.getElementById("address");
  let phone = document.getElementById("phone");
  let amount = document.getElementById("amount");
  let payment = document.getElementById("payment");
  let pincode = document.getElementById("pincode");

  document.querySelectorAll(".error-text").forEach(e => e.innerText = "");
  document.querySelectorAll("input, textarea").forEach(e => e.classList.remove("error"));

  if (!orderId.value) {
    orderId.classList.add("error");
    document.getElementById("orderIdError").innerText = "Required";
    valid = false;
  }

  if (!name.value || /\d/.test(name.value)) {
    name.classList.add("error");
    document.getElementById("nameError").innerText = "Enter valid name";
    valid = false;
  }

  if (!address.value) {
    address.classList.add("error");
    document.getElementById("addressError").innerText = "Required";
    valid = false;
  }

  if (!/^\d{10}$/.test(phone.value)) {
    phone.classList.add("error");
    document.getElementById("phoneError").innerText = "Enter 10-digit number";
    valid = false;
  }

  if (!/^\d+$/.test(amount.value)) {
    amount.classList.add("error");
    document.getElementById("amountError").innerText = "Numbers only";
    valid = false;
  }

  if (!payment.value) {
    payment.classList.add("error");
    document.getElementById("paymentError").innerText = "Required";
    valid = false;
  }

  if (!/^\d{6}$/.test(pincode.value)) {
    pincode.classList.add("error");
    document.getElementById("pincodeError").innerText = "Enter 6-digit pincode";
    valid = false;
  }

  return valid;
}

function getFormData() {
  return {
    orderId: document.getElementById("orderId").value,
    name: document.getElementById("name").value,
    address: document.getElementById("address").value,
    phone: document.getElementById("phone").value,
    amount: document.getElementById("amount").value,
    payment: document.getElementById("payment").value,
    pincode: document.getElementById("pincode").value,
    date: new Date().toLocaleDateString("en-GB")
  };
}

function saveOrder() {
  if (!validateForm()) {
    document.getElementById("msg").innerText = "❌ Fix errors before saving";
    return;
  }

  const order = getFormData();

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  document.getElementById("msg").innerText = "✅ Order Saved!";
}

function goToLabel() {
  if (!validateForm()) {
    document.getElementById("msg").innerText = "❌ Fix errors before generating label";
    return;
  }

  const data = getFormData();
  localStorage.setItem("labelData", JSON.stringify(data));

  window.location.href = "label.html";
}

function exportAll() {
  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  if (orders.length === 0) {
    alert("No orders found!");
    return;
  }

  let csv = "Order ID,Name,Address,Phone,Amount,Payment,Pincode,Date\n";

  orders.forEach(o => {
    csv += `${o.orderId},${o.name},"${o.address}",${o.phone},${o.amount},${o.payment},${o.pincode},${o.date}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "all_orders.csv";
  a.click();
}

</script>

</body>
</html>
